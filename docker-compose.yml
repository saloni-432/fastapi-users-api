version: "3.9"

services:

  db:
    image: postgres:15
    container_name: fastapi_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: usersdb
    ports:
      - "5432:5432"

  api:
    build: .
    container_name: fastapi_app
    depends_on:
      - db
    ports:
      - "8000:8000"